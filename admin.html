<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>Massage Tokyo – 管理画面</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Noto+Sans+JP:wght@400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --gold:#b8986a;--gold2:#d4b98a;--goldbg:rgba(184,152,106,.1);--goldbr:rgba(184,152,106,.25);
  --green:#34c759;--red:#ff3b30;--purple:#8b5cf6;
  --bd:#e5e5ea;--bd2:#f2f2f7;--w:#fff;--bg:#f2f2f7;
  --txt:#1c1c1e;--txt2:#636366;--txt3:#aeaeb2;
  --sh:0 1px 3px rgba(0,0,0,.1)
}
html,body{height:100%;font-family:Inter,"Noto Sans JP",sans-serif;font-size:15px;background:var(--bg);color:var(--txt);-webkit-font-smoothing:antialiased}
a{text-decoration:none;color:inherit}
button,input,select,textarea{font-family:inherit;font-size:inherit}

/* =====================
   LAYOUT
===================== */
.screen{display:none;flex-direction:column;min-height:100vh;padding-bottom:80px}
.screen.on{display:flex}

/* =====================
   TOP BAR
===================== */
.topbar{background:var(--w);border-bottom:1px solid var(--bd);padding:0 16px;height:52px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;flex-shrink:0}
.topbar-title{font-size:17px;font-weight:600;letter-spacing:-.3px}
.topbar-btn{background:var(--gold);color:#fff;border:none;border-radius:8px;padding:8px 14px;font-size:13px;font-weight:600;cursor:pointer;display:flex;align-items:center;gap:6px}
.topbar-btn svg{width:14px;height:14px}
.topbar-btn-ghost{background:none;border:1px solid var(--bd);color:var(--txt2);border-radius:8px;padding:8px 14px;font-size:13px;cursor:pointer}

/* =====================
   BOTTOM NAV
===================== */
.bottomnav{position:fixed;bottom:0;left:0;right:0;z-index:200;background:var(--w);border-top:1px solid var(--bd);display:flex;height:64px;padding-bottom:env(safe-area-inset-bottom)}
.bnav-item{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;cursor:pointer;border:none;background:none;padding:0;transition:color .15s;color:var(--txt3)}
.bnav-item.on{color:var(--gold)}
.bnav-item svg{width:22px;height:22px}
.bnav-label{font-size:10px;font-weight:500;letter-spacing:.2px}

/* =====================
   CARDS / SECTIONS
===================== */
.content{padding:16px;display:flex;flex-direction:column;gap:16px;flex:1}
.card{background:var(--w);border-radius:14px;overflow:hidden;box-shadow:var(--sh)}
.card-header{padding:14px 16px 0;display:flex;align-items:center;justify-content:space-between}
.card-title{font-size:13px;font-weight:600;color:var(--txt2);text-transform:uppercase;letter-spacing:.5px}
.card-body{padding:16px}

/* =====================
   TODAY SCREEN
===================== */
.date-hero{background:var(--gold);color:#fff;padding:20px 16px 18px;display:flex;align-items:center;justify-content:space-between}
.date-big{font-size:26px;font-weight:700;letter-spacing:-.5px}
.date-day{font-size:13px;opacity:.85;margin-top:2px}
.on-pill{background:rgba(255,255,255,.22);border:1px solid rgba(255,255,255,.3);border-radius:999px;padding:5px 12px;font-size:13px;font-weight:600;display:flex;align-items:center;gap:6px}
.on-dot{width:7px;height:7px;border-radius:50%;background:#fff;animation:pulse 1.5s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.35}}
.stat-row{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
.stat{background:var(--w);border-radius:12px;padding:14px 12px;text-align:center;box-shadow:var(--sh)}
.stat-num{font-size:28px;font-weight:700;line-height:1;margin-bottom:4px}
.stat-lbl{font-size:11px;color:var(--txt2);font-weight:500}
.today-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px}
.today-card{background:var(--w);border-radius:12px;overflow:hidden;box-shadow:var(--sh)}
.today-photo{width:100%;aspect-ratio:3/4;background-size:cover;background-position:center top;position:relative}
.rank-badge{position:absolute;top:8px;left:8px;font-size:9px;font-weight:700;letter-spacing:.5px;padding:3px 8px;border-radius:999px;color:#fff;text-transform:uppercase}
.rb-nf{background:#34c759}.rb-pm{background:var(--gold)}.rb-sp{background:var(--purple)}
.time-badge{position:absolute;bottom:8px;left:8px;right:8px;background:rgba(0,0,0,.62);border-radius:6px;padding:4px 8px;font-size:11px;color:#fff;font-weight:500;display:flex;align-items:center;gap:5px}
.time-badge svg{width:11px;height:11px;flex-shrink:0;opacity:.8}
.today-info{padding:10px 12px}
.today-name{font-size:14px;font-weight:600;margin-bottom:2px}
.today-meta{font-size:12px;color:var(--txt2)}
.empty-state{text-align:center;padding:40px 20px;color:var(--txt2)}
.empty-icon{width:56px;height:56px;margin:0 auto 12px;background:var(--bd2);border-radius:14px;display:flex;align-items:center;justify-content:center;color:var(--txt3)}
.empty-icon svg{width:28px;height:28px}
.empty-text{font-size:14px;color:var(--txt2);margin-bottom:16px;line-height:1.6}
.btn-primary{background:var(--gold);color:#fff;border:none;border-radius:10px;padding:12px 20px;font-size:14px;font-weight:600;cursor:pointer;display:inline-flex;align-items:center;gap:7px;transition:background .2s}
.btn-primary:active{background:var(--gold2)}
.btn-primary svg{width:16px;height:16px}

/* =====================
   SHIFT SCREEN
===================== */
.week-nav{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;background:var(--w);border-bottom:1px solid var(--bd)}
.week-label{font-size:15px;font-weight:600}
.week-arrow{background:none;border:1px solid var(--bd);border-radius:8px;width:36px;height:36px;display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--txt2)}
.week-arrow svg{width:16px;height:16px}
/* 日別リスト */
.day-list{display:flex;flex-direction:column;gap:10px;padding:16px}
.day-item{background:var(--w);border-radius:14px;overflow:hidden;box-shadow:var(--sh)}
.day-item.is-today{border:2px solid var(--gold)}
.day-header{padding:12px 14px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--bd2)}
.day-info{display:flex;align-items:baseline;gap:8px}
.day-name{font-size:11px;font-weight:700;color:var(--txt2);text-transform:uppercase;letter-spacing:.5px}
.day-date{font-size:18px;font-weight:700}
.day-item.is-today .day-date{color:var(--gold)}
.today-mark{font-size:10px;font-weight:700;background:var(--gold);color:#fff;padding:2px 8px;border-radius:999px}
.day-add-btn{background:var(--goldbg);border:1px solid var(--goldbr);color:var(--gold);border-radius:8px;padding:7px 13px;font-size:12px;font-weight:600;cursor:pointer;display:flex;align-items:center;gap:5px}
.day-add-btn svg{width:13px;height:13px}
.day-chips{padding:10px 14px;display:flex;flex-direction:column;gap:7px}
.shift-chip{background:var(--goldbg);border:1px solid var(--goldbr);border-radius:9px;padding:9px 12px;display:flex;align-items:center;justify-content:space-between}
.chip-left{display:flex;align-items:center;gap:10px;min-width:0;flex:1}
.chip-avatar{width:36px;height:36px;border-radius:8px;background-size:cover;background-position:center top;flex-shrink:0}
.chip-info{min-width:0}
.chip-name{font-size:14px;font-weight:600;color:var(--gold);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.chip-time{font-size:12px;color:var(--txt2);margin-top:1px;display:flex;align-items:center;gap:4px}
.chip-time svg{width:11px;height:11px;flex-shrink:0}
.chip-del{width:30px;height:30px;border:none;background:rgba(255,59,48,.1);border-radius:7px;color:var(--red);display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0}
.chip-del svg{width:14px;height:14px}
.day-empty{padding:10px 14px;font-size:13px;color:var(--txt3);display:flex;align-items:center;gap:6px}
.day-empty svg{width:14px;height:14px}
/* シフト追加モーダル */
.modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:500;backdrop-filter:blur(4px)}
.modal-bg.on{display:block}
.modal-sheet{position:fixed;bottom:0;left:0;right:0;background:var(--w);border-radius:20px 20px 0 0;z-index:501;max-height:85vh;display:flex;flex-direction:column}
.modal-handle{width:36px;height:4px;background:var(--bd);border-radius:999px;margin:10px auto 0}
.modal-head{padding:14px 16px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--bd)}
.modal-head h3{font-size:16px;font-weight:700}
.modal-close{width:28px;height:28px;border:none;background:var(--bd2);border-radius:999px;display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--txt2)}
.modal-close svg{width:14px;height:14px}
.modal-body{overflow-y:auto;flex:1;padding:16px}
/* 時間選択 */
.time-row{display:flex;align-items:center;gap:8px;padding:12px 14px;background:var(--bd2);border-radius:12px;margin-bottom:14px}
.time-row svg{width:16px;height:16px;color:var(--gold);flex-shrink:0}
.time-row label{font-size:13px;font-weight:600;color:var(--txt2);flex-shrink:0}
.time-sel{flex:1;padding:8px 10px;border:1.5px solid var(--bd);border-radius:8px;font-size:14px;background:var(--w);color:var(--txt);-webkit-appearance:auto;cursor:pointer}
.time-sel:focus{outline:none;border-color:var(--gold)}
.time-sep{font-size:14px;color:var(--txt2);flex-shrink:0;font-weight:500}
/* キャスト選択グリッド */
.picker-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px}
.picker-item{border:2px solid var(--bd);border-radius:12px;padding:10px;cursor:pointer;transition:all .15s;background:var(--w);position:relative;display:flex;align-items:center;gap:10px}
.picker-item:active{transform:scale(.97)}
.picker-item.sel{border-color:var(--gold);background:var(--goldbg)}
.picker-check{position:absolute;top:8px;right:8px;width:20px;height:20px;border-radius:999px;border:2px solid var(--bd);background:var(--w);display:flex;align-items:center;justify-content:center;transition:all .15s}
.picker-item.sel .picker-check{background:var(--gold);border-color:var(--gold)}
.picker-check svg{width:11px;height:11px;color:#fff;opacity:0}
.picker-item.sel .picker-check svg{opacity:1}
.picker-photo{width:44px;height:58px;border-radius:8px;background-size:cover;background-position:center top;flex-shrink:0}
.picker-info{min-width:0;flex:1}
.picker-name{font-size:13px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.picker-meta{font-size:11px;color:var(--txt2);margin-top:2px}
.picker-rank{font-size:9px;font-weight:700;padding:2px 6px;border-radius:4px;color:#fff;display:inline-block;margin-top:3px;text-transform:uppercase}
.modal-footer{padding:12px 16px;padding-bottom:max(12px,env(safe-area-inset-bottom));border-top:1px solid var(--bd);background:var(--w)}
.btn-full{width:100%;background:var(--gold);color:#fff;border:none;border-radius:12px;padding:15px;font-size:15px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;transition:background .2s}
.btn-full:active{background:var(--gold2)}
.btn-full svg{width:16px;height:16px}

/* =====================
   CAST SCREEN
===================== */
.search-bar{padding:10px 16px;background:var(--w);border-bottom:1px solid var(--bd)}
.search-input{width:100%;padding:10px 14px 10px 38px;background:var(--bd2);border:none;border-radius:10px;font-size:15px;color:var(--txt);outline:none;position:relative}
.search-wrap{position:relative}
.search-wrap svg{position:absolute;left:11px;top:50%;transform:translateY(-50%);width:16px;height:16px;color:var(--txt3)}
.rank-scroll{display:flex;gap:8px;padding:10px 16px;overflow-x:auto;background:var(--w);border-bottom:1px solid var(--bd);-webkit-overflow-scrolling:touch}
.rank-scroll::-webkit-scrollbar{display:none}
.rtab{padding:7px 16px;border-radius:999px;border:1.5px solid var(--bd);background:var(--w);color:var(--txt2);font-size:13px;font-weight:500;cursor:pointer;white-space:nowrap;transition:all .15s}
.rtab.on{border-color:var(--gold);background:var(--goldbg);color:var(--gold)}
.cast-list{display:flex;flex-direction:column;gap:10px;padding:16px}
.cast-item{background:var(--w);border-radius:14px;overflow:hidden;box-shadow:var(--sh);display:flex;align-items:stretch}
.cast-item.inactive{opacity:.45}
.ci-photo{width:80px;flex-shrink:0;background-size:cover;background-position:center top}
.ci-body{flex:1;padding:12px 14px;min-width:0}
.ci-top{display:flex;align-items:flex-start;justify-content:space-between;gap:8px;margin-bottom:4px}
.ci-name{font-size:16px;font-weight:700;line-height:1.2}
.ci-meta{font-size:12px;color:var(--txt2);margin-bottom:8px}
.ci-rank-pill{font-size:9px;font-weight:700;padding:3px 8px;border-radius:999px;color:#fff;text-transform:uppercase;flex-shrink:0}
.ci-actions{display:flex;gap:8px}
.ci-btn{flex:1;border:1.5px solid var(--bd);background:var(--w);color:var(--txt2);border-radius:8px;padding:8px 6px;font-size:12px;font-weight:600;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:4px;transition:all .15s}
.ci-btn svg{width:13px;height:13px}
.ci-btn.edit:active{border-color:var(--gold);color:var(--gold)}
.ci-btn.on-duty{background:var(--green);border-color:var(--green);color:#fff}
.ci-btn.off-duty{background:var(--bd2)}
.stt-dot{width:8px;height:8px;border-radius:50%;display:inline-block}

/* =====================
   CAST EDIT MODAL (full screen sheet)
===================== */
.edit-modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:500;backdrop-filter:blur(4px)}
.edit-modal-bg.on{display:block}
.edit-sheet{position:fixed;bottom:0;left:0;right:0;background:var(--w);border-radius:20px 20px 0 0;z-index:501;max-height:92vh;display:flex;flex-direction:column}
.edit-preview{padding:16px;background:var(--bd2);display:flex;align-items:center;gap:14px}
.edit-photo-prev{width:60px;height:80px;border-radius:10px;background-size:cover;background-position:center top;background-color:var(--bd);border:1px solid var(--bd);flex-shrink:0}
.edit-name-prev{font-size:18px;font-weight:700;line-height:1.2}
.edit-sub-prev{font-size:13px;color:var(--txt2);margin-top:3px}
.form-list{display:flex;flex-direction:column;gap:0;overflow-y:auto;flex:1}
.form-row{display:flex;align-items:center;padding:14px 16px;border-bottom:1px solid var(--bd2)}
.form-label{font-size:14px;color:var(--txt2);width:90px;flex-shrink:0}
.form-input{flex:1;padding:8px 12px;border:1.5px solid var(--bd);border-radius:9px;font-size:15px;color:var(--txt);background:var(--w);outline:none;min-width:0}
.form-input:focus{border-color:var(--gold)}
.form-textarea{flex:1;padding:10px 12px;border:1.5px solid var(--bd);border-radius:9px;font-size:15px;color:var(--txt);background:var(--w);outline:none;resize:none;min-width:0}
.form-textarea:focus{border-color:var(--gold)}
.form-select{flex:1;padding:8px 12px;border:1.5px solid var(--bd);border-radius:9px;font-size:15px;color:var(--txt);background:var(--w);outline:none;-webkit-appearance:auto}
.form-select:focus{border-color:var(--gold)}
.img-preview-note{font-size:11px;color:var(--txt3);margin-top:4px;flex-basis:100%}
.edit-footer{padding:12px 16px;padding-bottom:max(12px,env(safe-area-inset-bottom));border-top:1px solid var(--bd);background:var(--w);display:flex;gap:10px}
.btn-danger{flex:1;background:#fff0f0;color:var(--red);border:1.5px solid #fecaca;border-radius:12px;padding:14px;font-size:14px;font-weight:600;cursor:pointer}
.btn-save{flex:2;background:var(--gold);color:#fff;border:none;border-radius:12px;padding:14px;font-size:15px;font-weight:700;cursor:pointer}

/* =====================
   TOAST
===================== */
.toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%) translateY(12px);background:#1c1c1e;color:#fff;padding:11px 20px;border-radius:10px;font-size:14px;font-weight:500;z-index:9999;opacity:0;transition:all .25s;pointer-events:none;white-space:nowrap;box-shadow:0 4px 20px rgba(0,0,0,.25)}
.toast.on{opacity:1;transform:translateX(-50%) translateY(0)}
.toast.ok{background:var(--green)}
</style>
</head>
<body>

<!-- =====================
     TODAY SCREEN
===================== -->
<div class="screen on" id="scr-today">
  <div class="date-hero">
    <div>
      <div class="date-big" id="dateLabel">-</div>
      <div class="date-day" id="dateSub">-</div>
    </div>
    <div class="on-pill"><span class="on-dot"></span><span id="onCount">0名出勤中</span></div>
  </div>
  <div class="content">
    <div class="stat-row">
      <div class="stat"><div class="stat-num" id="sTotal">0</div><div class="stat-lbl">総キャスト</div></div>
      <div class="stat"><div class="stat-num" id="sToday" style="color:var(--green)">0</div><div class="stat-lbl">本日出勤</div></div>
      <div class="stat"><div class="stat-num" id="sPm" style="color:var(--gold)">0</div><div class="stat-lbl">PREMIUM</div></div>
    </div>
    <div class="card">
      <div class="card-header">
        <span class="card-title">本日の出勤キャスト</span>
        <button class="topbar-btn-ghost" style="font-size:12px" onclick="goShift()">シフトを編集</button>
      </div>
      <div class="card-body">
        <div id="todayGrid"></div>
      </div>
    </div>
  </div>
</div>

<!-- =====================
     SHIFT SCREEN
===================== -->
<div class="screen" id="scr-shift">
  <div class="week-nav">
    <button class="week-arrow" onclick="prevW()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M15 18l-6-6 6-6"/></svg>
    </button>
    <span class="week-label" id="weekLabel">-</span>
    <button class="week-arrow" onclick="nextW()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M9 18l6-6-6-6"/></svg>
    </button>
  </div>
  <div class="day-list" id="dayList"></div>
</div>

<!-- =====================
     CAST SCREEN
===================== -->
<div class="screen" id="scr-cast">
  <div class="topbar">
    <span class="topbar-title">キャスト管理</span>
    <button class="topbar-btn" onclick="openAdd()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
      追加
    </button>
  </div>
  <div class="search-bar">
    <div class="search-wrap">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/></svg>
      <input type="text" class="search-input" id="castSearch" placeholder="名前で検索..." oninput="renderCast()">
    </div>
  </div>
  <div class="rank-scroll">
    <button class="rtab on" onclick="setRank('ALL',this)">すべて</button>
    <button class="rtab" onclick="setRank('NEW FACE',this)">NEW FACE</button>
    <button class="rtab" onclick="setRank('PREMIUM',this)">PREMIUM</button>
    <button class="rtab" onclick="setRank('SPECIAL',this)">SPECIAL</button>
  </div>
  <div class="cast-list" id="castList"></div>
</div>

<!-- =====================
     BOTTOM NAV
===================== -->
<nav class="bottomnav">
  <button class="bnav-item on" id="nav-today" onclick="goTab('today')">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9,22 9,12 15,12 15,22"/></svg>
    <span class="bnav-label">今日</span>
  </button>
  <button class="bnav-item" id="nav-shift" onclick="goTab('shift')">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="3" y="4" width="18" height="18" rx="2"/><path d="M16 2v4M8 2v4M3 10h18"/></svg>
    <span class="bnav-label">シフト</span>
  </button>
  <button class="bnav-item" id="nav-cast" onclick="goTab('cast')">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/></svg>
    <span class="bnav-label">キャスト</span>
  </button>
  <a class="bnav-item" href="https://c-t0922.github.io/happyend-lp/" target="_blank">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="12" cy="12" r="10"/><path d="M2 12h20M12 2a15 15 0 0 1 0 20M12 2a15 15 0 0 0 0 20"/></svg>
    <span class="bnav-label">LPを見る</span>
  </a>
</nav>

<!-- =====================
     SHIFT ADD MODAL (bottom sheet)
===================== -->
<div class="modal-bg" id="shiftBg" onclick="closeShiftModal()"></div>
<div class="modal-sheet" id="shiftSheet" style="display:none">

function loadC(){try{var s=localStorage.getItem("mt_cast");return s?JSON.parse(s):DEFAULT_CAST;}catch(e){return DEFAULT_CAST;}}
function saveC(){localStorage.setItem("mt_cast",JSON.stringify(CAST));}
function loadSh(){try{var s=localStorage.getItem("mt_shifts2");return s?JSON.parse(s):{};}catch(e){return {};}}
function saveSh(){localStorage.setItem("mt_shifts2",JSON.stringify(SHIFTS));}
var CAST=loadC(),SHIFTS=loadSh(),rankFlt="ALL",editIdx=null,shiftDK=null,weekOff=0;
function dKey(d){return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0");}
function todayKey(){return dKey(new Date());}
function rc(rank){return rank==="PREMIUM"?"rb-pm":rank==="SPECIAL"?"rb-sp":"rb-nf";}
function rcColor(rank){return rank==="PREMIUM"?"var(--gold)":rank==="SPECIAL"?"var(--purple)":"#34c759";}

/* ========== TABS ========== */
function goTab(name){
  document.querySelectorAll(".screen").forEach(function(s){s.classList.remove("on");});
  document.querySelectorAll(".bnav-item").forEach(function(b){b.classList.remove("on");});
  document.getElementById("scr-"+name).classList.add("on");
  var nav=document.getElementById("nav-"+name);
  if(nav)nav.classList.add("on");
  if(name==="today")renderToday();
  if(name==="shift")renderShift();
  if(name==="cast")renderCast();
}
function goShift(){goTab("shift");}

/* ========== TODAY ========== */
function renderToday(){
  var now=new Date();
  var days=["日","月","火","水","木","金","土"];
  var months=["1月","2月","3月","4月","5月","6月","7月","8月","9月","10月","11月","12月"];
  document.getElementById("dateLabel").textContent=months[now.getMonth()]+now.getDate()+"日";
  document.getElementById("dateSub").textContent="("+days[now.getDay()]+")";
  var key=todayKey();
  var entries=SHIFTS[key]||[];
  var todayCast=entries.map(function(e){var c=CAST.find(function(x){return x.id===e.id;});return c?{cast:c,start:e.start,end:e.end}:null;}).filter(Boolean);
  document.getElementById("onCount").textContent=todayCast.length+"名出勤中";
  document.getElementById("sTotal").textContent=CAST.length;
  document.getElementById("sToday").textContent=todayCast.length;
  document.getElementById("sPm").textContent=CAST.filter(function(c){return c.rank==="PREMIUM";}).length;
  var grid=document.getElementById("todayGrid");
  if(!todayCast.length){
    grid.innerHTML='<div class="empty-state"><div class="empty-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="4" width="18" height="18" rx="2"/><path d="M16 2v4M8 2v4M3 10h18"/></svg></div><div class="empty-text">本日のシフトが登録されていません</div><button class="btn-primary" onclick="goShift()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>シフトを登録する</button></div>';
    return;
  }
  grid.innerHTML='<div class="today-grid">'+todayCast.map(function(item){
    var c=item.cast,cl=rc(c.rank);
    var timeStr=item.start&&item.end?item.start+"〜"+item.end:"";
    return '<div class="today-card"><div class="today-photo" style="background-image:url(\''+c.img+'\')">'
      +'<span class="rank-badge '+cl+'">'+c.rank+'</span>'
      +(timeStr?'<div class="time-badge"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12,6 12,12 16,14"/></svg>'+timeStr+'</div>':'')
      +'</div><div class="today-info"><div class="today-name">'+c.name+'</div><div class="today-meta">AGE '+c.age+' · T'+c.height+'</div></div></div>';
  }).join("")+'</div>';
}

/* ========== SHIFT ========== */
function getWeekDates(off){
  var today=new Date(),dow=today.getDay(),mon=new Date(today);
  mon.setDate(today.getDate()-(dow===0?6:dow-1)+(off*7));
  var arr=[];for(var i=0;i<7;i++){var d=new Date(mon);d.setDate(mon.getDate()+i);arr.push(d);}
  return arr;
}
function renderShift(){
  var dates=getWeekDates(weekOff);
  var dayNm=["月","火","水","木","金","土","日"];
  var tdk=todayKey();
  var f=dates[0],l=dates[6];
  document.getElementById("weekLabel").textContent=(f.getMonth()+1)+"/"+f.getDate()+"〜"+(l.getMonth()+1)+"/"+l.getDate();
  var html="";
  dates.forEach(function(d,i){
    var key=dKey(d),isT=key===tdk;
    var entries=SHIFTS[key]||[];
    var chips=entries.map(function(e){
      var c=CAST.find(function(x){return x.id===e.id;});
      if(!c)return "";
      var cl=rc(c.rank);
      return '<div class="shift-chip"><div class="chip-left">'
        +'<div class="chip-avatar" style="background-image:url(\''+c.img+'\')"></div>'
        +'<div class="chip-info"><div class="chip-name">'+c.name+'</div>'
        +'<div class="chip-time"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12,6 12,12 16,14"/></svg>'+(e.start&&e.end?e.start+"〜"+e.end:"時間未設定")+'</div></div></div>'
        +'<button class="chip-del" onclick="rmShift(\''+key+'\','+e.id+')" title="削除"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M18 6L6 18M6 6l12 12"/></svg></button></div>';
    }).join("");
    html+='<div class="day-item'+(isT?" is-today":"")+'"><div class="day-header"><div class="day-info"><span class="day-name">'+dayNm[i]+'</span><span class="day-date">'+(d.getMonth()+1)+"/"+(d.getDate())+'</span>'+(isT?'<span class="today-mark">TODAY</span>':'')+'</div><button class="day-add-btn" onclick="openShiftModal(\''+key+'\')">'
      +'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>追加</button></div>'
      +(chips?'<div class="day-chips">'+chips+'</div>':'<div class="day-empty"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="12" cy="12" r="10"/><path d="M8 12h8"/></svg>出勤登録なし</div>')
      +'</div>';
  });
  document.getElementById("dayList").innerHTML=html;
}
function prevW(){weekOff--;renderShift();}
function nextW(){weekOff++;renderShift();}

/* シフトモーダル */
function buildTimeOpts(){
  var opts=[];
  for(var h=10;h<=29;h++){
    opts.push(String(h).padStart(2,"0")+":00");
    if(h<29)opts.push(String(h).padStart(2,"0")+":30");
  }
  return opts;
}
var TIME_OPTS=buildTimeOpts();
function populateSel(id,def){
  var sel=document.getElementById(id);
  sel.innerHTML=TIME_OPTS.map(function(t){return '<option value="'+t+'"'+(t===def?" selected":"")+'">'+t+'</option>';}).join("");
}
function openShiftModal(key){
  shiftDK=key;
  var d=new Date(key);
  document.getElementById("shiftModalTitle").textContent=(d.getMonth()+1)+"/"+(d.getDate())+"のシフト登録";
  populateSel("tStart","12:00");populateSel("tEnd","29:00");
  var cur=(SHIFTS[key]||[]).map(function(e){return e.id;});
  document.getElementById("pickerGrid").innerHTML=CAST.map(function(c){
    var sel=cur.indexOf(c.id)>=0;
    return '<div class="picker-item'+(sel?" sel":"")+'" id="pi-'+c.id+'" onclick="togglePick('+c.id+')">'
      +'<div class="picker-photo" style="background-image:url(\''+c.img+'\')"></div>'
      +'<div class="picker-info"><div class="picker-name">'+c.name+'</div><div class="picker-meta">AGE '+c.age+' · T'+c.height+'</div>'
      +'<span class="picker-rank" style="background:'+rcColor(c.rank)+'">'+c.rank+'</span></div>'
      +'<div class="picker-check"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><path d="M20 6L9 17l-5-5"/></svg></div></div>';
  }).join("");
  document.getElementById("shiftBg").classList.add("on");
  document.getElementById("shiftSheet").style.display="flex";
  document.getElementById("shiftSheet").style.flexDirection="column";
}
function closeShiftModal(){
  document.getElementById("shiftBg").classList.remove("on");
  document.getElementById("shiftSheet").style.display="none";
  shiftDK=null;
}
function togglePick(id){document.getElementById("pi-"+id).classList.toggle("sel");}
function applyShift(){
  if(!shiftDK)return;
  var start=document.getElementById("tStart").value,end=document.getElementById("tEnd").value;
  if(start>=end){showToast("終了は開始より後にしてください");return;}
  var selIds=[];
  document.querySelectorAll(".picker-item.sel").forEach(function(el){selIds.push(parseInt(el.id.replace("pi-","")));});
  var existing=(SHIFTS[shiftDK]||[]).filter(function(e){return selIds.indexOf(e.id)<0;});
  SHIFTS[shiftDK]=existing.concat(selIds.map(function(id){return {id:id,start:start,end:end};}));
  saveSh();closeShiftModal();renderShift();
  if(shiftDK===todayKey())renderToday();
  showToast(selIds.length+"名のシフトを登録しました","ok");
}
function rmShift(key,id){
  if(!SHIFTS[key])return;
  SHIFTS[key]=SHIFTS[key].filter(function(e){return e.id!==id;});
  if(!SHIFTS[key].length)delete SHIFTS[key];
  saveSh();renderShift();
  if(key===todayKey())renderToday();
}

/* ========== CAST ========== */
function setRank(r,btn){rankFlt=r;document.querySelectorAll(".rtab").forEach(function(b){b.classList.remove("on");});btn.classList.add("on");renderCast();}
function renderCast(){
  var q=(document.getElementById("castSearch").value||"").toLowerCase();
  var list=CAST.filter(function(c){
    if(q&&!c.name.toLowerCase().includes(q))return false;
    if(rankFlt!=="ALL"&&c.rank!==rankFlt)return false;
    return true;
  });
  if(!list.length){document.getElementById("castList").innerHTML='<div class="empty-state"><div class="empty-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/></svg></div><div class="empty-text">キャストが見つかりません</div></div>';return;}
  document.getElementById("castList").innerHTML=list.map(function(c){
    var idx=CAST.indexOf(c);
    var cl=rc(c.rank);
    return '<div class="cast-item'+(c.active?"":" inactive")+'">'
      +'<div class="ci-photo" style="background-image:url(\''+c.img+'\')"></div>'
      +'<div class="ci-body">'
      +'<div class="ci-top"><div class="ci-name">'+c.name+'</div><span class="ci-rank-pill" style="background:'+rcColor(c.rank)+'">'+c.rank+'</span></div>'
      +'<div class="ci-meta">AGE '+c.age+' · T'+c.height+' ('+c.cup+')</div>'
      +'<div class="ci-actions">'
      +'<button class="ci-btn edit" onclick="openEdit('+idx+')">'
      +'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>'
      +'編集</button>'
      +'<button class="ci-btn '+(c.active?"on-duty":"off-duty")+'" onclick="toggleStt('+idx+')">'
      +(c.active?'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22,4 12,14.01 9,11.01"/></svg>出勤中'
               :'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>休み')
      +'</button></div></div></div>';
  }).join("");
}
function toggleStt(idx){
  CAST[idx].active=CAST[idx].active?0:1;saveC();renderCast();
  showToast(CAST[idx].name+(CAST[idx].active?" → 出勤中":" → 休み"),"ok");
}

  document.getElementById("fDesc").value=c.desc||"";

  document.getElementById("epName").textContent=c.name;

  document.getElementById("epSub").textContent="NEW FACE";

function updatePreview(){var u=document.getElementById("fImg").value;document.getElementById("epPhoto").style.backgroundImage=u?"url('"+u+"')":''}
function updatePreviewName(){document.getElementById("epName").textContent=document.getElementById("fName").value||"-";}
function doSave(){
  var name=document.getElementById("fName").value.trim();
  if(!name){showToast("名前を入力してください");return;}
  var data={rank:document.getElementById("fRank").value,name:name,age:document.getElementById("fAge").value,
    height:document.getElementById("fHeight").value,cup:document.getElementById("fCup").value,
    img:document.getElementById("fImg").value,desc:document.getElementById("fDesc").value,
    active:parseInt(document.getElementById("fActive").value)};
  if(editIdx!==null){data.id=CAST[editIdx].id;CAST[editIdx]=data;showToast(name+" を更新しました","ok");}
  else{data.id=Date.now();CAST.push(data);showToast(name+" を追加しました","ok");}
  saveC();renderCast();closeEdit();
}
function doDelete(){
  if(editIdx===null)return;
  if(!confirm(CAST[editIdx].name+" を削除しますか？"))return;
  var name=CAST[editIdx].name;
  CAST.splice(editIdx,1);saveC();renderCast();closeEdit();showToast(name+" を削除しました");
}

/* ========== TOAST ========== */
function showToast(msg,type){
  var el=document.getElementById("toast");
  el.textContent=msg;el.className="toast"+(type?" "+type:"");
  void el.offsetWidth;el.classList.add("on");
  clearTimeout(el._t);el._t=setTimeout(function(){el.classList.remove("on");},2500);
}

/* ========== INIT ========== */
renderToday();
</script>

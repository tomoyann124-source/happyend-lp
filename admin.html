<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Massage Tokyo – 管理画面</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--b:#1a1a1a;--b2:#252525;--b3:#2f2f2f;--gold:#b8986a;--glt:#d4b98a;--w:#fff;--g:#888;--gl:#666;--s:#f2ddd8;--green:#4caf50;--red:#e53935;--bd:rgba(255,255,255,.1)}
body{font-family:'Segoe UI','Noto Sans JP',sans-serif;background:var(--b);color:var(--w);min-height:100vh}
a{color:inherit;text-decoration:none}
.sidebar{position:fixed;top:0;left:0;width:220px;height:100vh;background:var(--b2);border-right:1px solid var(--bd);display:flex;flex-direction:column;z-index:100}
.sidebar-logo{padding:1.5rem;border-bottom:1px solid var(--bd)}
.sidebar-logo h1{font-size:.95rem;letter-spacing:.2em;color:var(--gold);font-weight:400}
.sidebar-logo span{display:block;font-size:.55rem;letter-spacing:.3em;color:var(--g);margin-top:.3rem}
.sidebar-nav{padding:1rem 0;flex:1}
.nav-item{display:flex;align-items:center;gap:.75rem;padding:.85rem 1.5rem;font-size:.8rem;letter-spacing:.05em;cursor:pointer;transition:background .2s,color .2s;color:var(--g)}
.nav-item:hover,.nav-item.active{background:rgba(184,152,106,.1);color:var(--gold)}
.nav-item .icon{font-size:1rem;width:20px;text-align:center}
.sidebar-footer{padding:1rem 1.5rem;border-top:1px solid var(--bd)}
.sidebar-footer a{font-size:.7rem;color:var(--g);letter-spacing:.1em}.sidebar-footer a:hover{color:var(--gold)}
.main{margin-left:220px;min-height:100vh}
.topbar{background:var(--b2);border-bottom:1px solid var(--bd);padding:1rem 2rem;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:99}
.topbar-title{font-size:1rem;letter-spacing:.1em;color:var(--w)}
.topbar-actions{display:flex;gap:.75rem;align-items:center}
.btn{padding:.6rem 1.4rem;font-size:.7rem;letter-spacing:.15em;cursor:pointer;border:none;transition:all .2s;font-family:inherit}
.btn-gold{background:var(--gold);color:var(--w)}.btn-gold:hover{background:var(--glt)}
.btn-outline{background:transparent;color:var(--gold);border:1px solid var(--gold)}.btn-outline:hover{background:var(--gold);color:var(--w)}
.btn-danger{background:var(--red);color:var(--w)}.btn-danger:hover{filter:brightness(1.1)}
.btn-sm{padding:.4rem .9rem;font-size:.65rem}
.content{padding:2rem}
.tab-panel{display:none}.tab-panel.active{display:block}
.stats-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:1rem;margin-bottom:2rem}
.stat-card{background:var(--b2);border:1px solid var(--bd);padding:1.5rem;text-align:center}
.stat-num{font-size:2rem;font-weight:300;color:var(--gold);line-height:1}
.stat-label{font-size:.65rem;letter-spacing:.3em;color:var(--g);margin-top:.5rem;text-transform:uppercase}
.cast-controls{display:flex;gap:1rem;margin-bottom:1.5rem;flex-wrap:wrap;align-items:center}
.search-box{flex:1;min-width:200px;background:var(--b3);border:1px solid var(--bd);color:var(--w);padding:.65rem 1rem;font-size:.8rem;font-family:inherit}.search-box::placeholder{color:var(--g)}.search-box:focus{outline:none;border-color:var(--gold)}
.filter-btn{padding:.6rem 1.2rem;font-size:.7rem;cursor:pointer;border:1px solid var(--bd);background:var(--b3);color:var(--g);letter-spacing:.1em;transition:all .2s;font-family:inherit}
.filter-btn.active{border-color:var(--gold);color:var(--gold);background:rgba(184,152,106,.1)}
.cast-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(185px,1fr));gap:1.25rem}
.cast-card{background:var(--b2);border:1px solid var(--bd);overflow:hidden;transition:border-color .2s}.cast-card:hover{border-color:var(--gold)}.cast-card.inactive{opacity:.45}
.cast-img-wrap{position:relative;overflow:hidden}
.cast-img-wrap .cbgi{width:100%;aspect-ratio:3/4;background-size:cover;background-position:center top;display:block;transition:transform .4s}.cast-card:hover .cast-img-wrap .cbgi{transform:scale(1.04)}
.cast-rank{position:absolute;top:.6rem;left:.6rem;font-size:.5rem;letter-spacing:.2em;text-transform:uppercase;padding:.25rem .6rem;font-weight:600}
.cast-rank.nf{background:#4caf50;color:#fff}.cast-rank.pm{background:var(--gold);color:#fff}.cast-rank.sp{background:#9c27b0;color:#fff}
.cast-overlay{position:absolute;inset:0;background:rgba(0,0,0,.6);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:.5rem;opacity:0;transition:opacity .2s}
.cast-card:hover .cast-overlay{opacity:1}
.cast-edit-btn,.cast-toggle-btn{padding:.5rem 1rem;font-size:.65rem;letter-spacing:.1em;cursor:pointer;border:none;font-family:inherit;width:120px}
.cast-edit-btn{background:var(--gold);color:#fff}.cast-toggle-btn{background:rgba(255,255,255,.1);color:#fff;border:1px solid rgba(255,255,255,.3)}
.cast-info{padding:.85rem}
.cast-name-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:.3rem}
.cast-name{font-size:.9rem;letter-spacing:.05em}
.cast-active{font-size:.55rem;letter-spacing:.1em;padding:.2rem .5rem}
.cast-active.on{color:#4caf50;background:rgba(76,175,80,.1)}.cast-active.off{color:var(--g);background:rgba(255,255,255,.05)}
.cast-meta{font-size:.7rem;color:var(--g);letter-spacing:.05em}
.modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.8);z-index:1000;align-items:center;justify-content:center}
.modal-bg.show{display:flex}
.modal{background:var(--b2);border:1px solid var(--bd);width:min(520px,95vw);max-height:90vh;overflow-y:auto}
.modal-head{padding:1.25rem 1.5rem;border-bottom:1px solid var(--bd);display:flex;justify-content:space-between;align-items:center}
.modal-head h3{font-size:.9rem;letter-spacing:.1em;color:var(--gold);font-weight:400}
.modal-close{background:none;border:none;color:var(--g);font-size:1.2rem;cursor:pointer}
.modal-body{padding:1.5rem;display:grid;gap:1rem}
.modal-preview{text-align:center;margin-bottom:.5rem}
.modal-preview .prev-img{width:100px;height:133px;background-size:cover;background-position:center top;margin:0 auto;border:1px solid var(--bd)}
.form-group{display:flex;flex-direction:column;gap:.4rem}
.form-group label{font-size:.65rem;letter-spacing:.2em;color:var(--g);text-transform:uppercase}
.form-group input,.form-group select,.form-group textarea{background:var(--b3);border:1px solid var(--bd);color:var(--w);padding:.65rem;font-size:.8rem;font-family:inherit}.form-group input:focus,.form-group select:focus,.form-group textarea:focus{outline:none;border-color:var(--gold)}
.form-group textarea{resize:vertical;min-height:70px}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:1rem}
.modal-foot{padding:1rem 1.5rem;border-top:1px solid var(--bd);display:flex;justify-content:flex-end;gap:.75rem}
.toast{position:fixed;bottom:2rem;right:2rem;background:var(--gold);color:var(--w);padding:.85rem 1.5rem;font-size:.8rem;letter-spacing:.1em;z-index:9999;transform:translateY(100px);opacity:0;transition:all .3s}
.toast.show{transform:translateY(0);opacity:1}
.preview-wrap{background:var(--b3);border:1px solid var(--bd);padding:1.25rem 1.5rem;margin-bottom:1.5rem;display:flex;align-items:center;gap:1rem}
.preview-wrap .lp-url{font-size:.8rem;color:var(--gold);flex:1}
.schedule-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:.5rem;margin-bottom:1.5rem}
.day-col{background:var(--b3);border:1px solid var(--bd);padding:.75rem .5rem;text-align:center}
.day-col .day-label{font-size:.6rem;letter-spacing:.2em;color:var(--g);margin-bottom:.75rem;text-transform:uppercase}
.day-cast{font-size:.62rem;color:var(--w);background:rgba(184,152,106,.2);border:1px solid rgba(184,152,106,.3);padding:.22rem .4rem;margin-bottom:.3rem}
@media(max-width:768px){.sidebar{width:60px}.sidebar-logo h1,.sidebar-logo span,.nav-item span{display:none}.main{margin-left:60px}.stats-grid{grid-template-columns:repeat(2,1fr)}.cast-grid{grid-template-columns:repeat(2,1fr)}}
</style>
</head>
<body>
<aside class="sidebar">
  <div class="sidebar-logo">
    <h1>Massage Tokyo</h1>
    <span>Admin Dashboard</span>
  </div>

    <div class="nav-item active" onclick="showTab('cast',this)"><span class="icon">👤</span><span>キャスト管理</span></div>

    <div class="nav-item" onclick="showTab('settings',this)"><span class="icon">⚙️</span><span>設定</span></div>
  </nav>

<main class="main">
  <div class="topbar">

    <div class="topbar-actions">

    </div>
  </div>

  <div class="content">
    <!-- CAST TAB -->
    <div class="tab-panel active" id="tab-cast">
      <div class="stats-grid">
        <div class="stat-card"><div class="stat-num" id="stat-total">20</div><div class="stat-label">総キャスト</div></div>
        <div class="stat-card"><div class="stat-num" id="stat-active" style="color:#4caf50">20</div><div class="stat-label">出勤中</div></div>
        <div class="stat-card"><div class="stat-num" id="stat-premium" style="color:var(--gold)">8</div><div class="stat-label">PREMIUM</div></div>
        <div class="stat-card"><div class="stat-num" id="stat-special" style="color:#9c27b0">1</div><div class="stat-label">SPECIAL</div></div>

      <div class="cast-controls">
        <input type="text" class="search-box" placeholder="🔍 キャスト名で検索..." oninput="filterCast(this.value)">
        <button class="filter-btn active" onclick="filterRank('ALL',this)">全員</button>
        <button class="filter-btn" onclick="filterRank('NEW FACE',this)">NEW FACE</button>
        <button class="filter-btn" onclick="filterRank('PREMIUM',this)">PREMIUM</button>
        <button class="filter-btn" onclick="filterRank('SPECIAL',this)">SPECIAL</button>
        <button class="filter-btn" onclick="filterRank('active',this)">出勤中のみ</button>
      </div>
      <div class="cast-grid" id="castGrid"></div>
    </div>

    <!-- SCHEDULE TAB -->
    <div class="tab-panel" id="tab-schedule">
      <h2 style="font-size:1rem;letter-spacing:.15em;font-weight:400;color:var(--gold);margin-bottom:1.5rem">今週の出勤スケジュール</h2>
      <div class="schedule-grid" id="scheduleGrid"></div>
    </div>

    <!-- LP TAB -->
    <div class="tab-panel" id="tab-lp">
      <div class="preview-wrap">
        <div><p style="font-size:.65rem;letter-spacing:.3em;color:var(--g);margin-bottom:.5rem">LIVE LP URL</p><a class="lp-url" href="https://c-t0922.github.io/happyend-lp/" target="_blank">https://c-t0922.github.io/happyend-lp/ ↗</a></div>
        <button class="btn btn-outline btn-sm" onclick="window.open('https://c-t0922.github.io/happyend-lp/','_blank')">プレビュー</button>
      </div>
      <iframe src="https://c-t0922.github.io/happyend-lp/" style="width:100%;height:70vh;border:1px solid rgba(255,255,255,.1)" title="LP Preview"></iframe>
    </div>

    <!-- SETTINGS TAB -->
    <div class="tab-panel" id="tab-settings">
      <div style="max-width:500px">
        <h2 style="font-size:1rem;letter-spacing:.15em;font-weight:400;color:var(--gold);margin-bottom:1.5rem">基本設定</h2>
        <div style="display:flex;flex-direction:column;gap:1rem">
          <div class="form-group"><label>サイト名</label><input type="text" value="Massage Tokyo"></div>
          <div class="form-group"><label>メールアドレス</label><input type="email" value="ginza.esthe@gmail.com"></div>
          <div class="form-group"><label>LINE ID</label><input type="text" value="@happyend_ginza"></div>
          <div class="form-group"><label>営業時間</label><input type="text" value="12:00〜29:00"></div>
          <button class="btn btn-gold" style="width:fit-content" onclick="showToast('設定を保存しました')">設定を保存</button>
        </div>
      </div>
    </div>
  </div>
</main>

<!-- EDIT MODAL -->
<div class="modal-bg" id="editModal">
  <div class="modal">
    <div class="modal-head">
      <h3 id="modal-title">キャスト編集</h3>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-body">
      <div class="modal-preview">
        <div class="prev-img" id="prev-img"></div>
      </div>
      <div class="form-group"><label>プロフィール画像 URL</label><input type="text" id="edit-img" oninput="updatePreview(this.value)"></div>
      <div class="form-group"><label>名前</label><input type="text" id="edit-name"></div>
      <div class="form-row">
        <div class="form-group"><label>年齢</label><input type="number" id="edit-age" min="18" max="50"></div>
        <div class="form-group"><label>身長 (cm)</label><input type="number" id="edit-height" min="140" max="185"></div>
      </div>
      <div class="form-row">
        <div class="form-group"><label>カップ数</label><select id="edit-cup"><option>A</option><option>B</option><option>C</option><option>D</option><option>E</option><option>F</option><option>G</option><option>H</option><option>I</option></select></div>
        <div class="form-group"><label>ランク</label><select id="edit-rank"><option value="NEW FACE">NEW FACE</option><option value="PREMIUM">PREMIUM</option><option value="SPECIAL">SPECIAL</option></select></div>
      </div>
      <div class="form-group"><label>一言コメント</label><textarea id="edit-comment" rows="3"></textarea></div>
    </div>
    <div class="modal-foot">
      <button class="btn btn-outline btn-sm" onclick="closeModal()">キャンセル</button>
      <button class="btn btn-danger btn-sm" onclick="deleteCast()">削除</button>
      <button class="btn btn-gold btn-sm" onclick="saveCast()">保存</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

  {rank:"NEW FACE",name:"Amagifu",age:"25",height:"160",cup:"F",desc:"Beautiful and charming — fresh energy you will love.",img:"https://estemax.net/happy-end/wp-content/uploads/2025/05/MEITU_20250123_203010978.webp",active:true},
  {rank:"NEW FACE",name:"Marcy",age:"23",height:"157",cup:"D",desc:"Cute and fresh — ready to make your experience special.",img:"https://estemax.net/happy-end/wp-content/uploads/2025/05/1731254097017.webp",active:true},
  {rank:"NEW FACE",name:"Mountain Dew",age:"24",height:"162",cup:"E",desc:"A unique presence — fresh and full of surprises.",img:"https://estemax.net/happy-end/wp-content/uploads/2025/05/1735052534887.webp",active:true},
  {rank:"NEW FACE",name:"Andrew",age:"22",height:"163",cup:"D",desc:"Charming new face bringing a fresh spark to every session.",img:"https://estemax.net/happy-end/wp-content/uploads/2025/05/1737710418647.webp",active:true}
];

let currentEditCard = null;

function renderGrid(data) {
  const grid = document.getElementById('castGrid');
  grid.innerHTML = data.map((c, i) => {
    const rc = c.rank==='PREMIUM'?'pm':c.rank==='SPECIAL'?'sp':'nf';
    return '<div class="cast-card'+(c.active?'':' inactive')+'" data-rank="'+c.rank+'" data-name="'+c.name+'" data-idx="'+i+'">'+
      '<div class="cast-img-wrap">'+
        '<span class="cast-rank '+rc+'">'+c.rank+'</span>'+
        '<div class="cbgi" style="background-image:url(''+c.img+'')"></div>'+
        '<div class="cast-overlay">'+
          '<button class="cast-edit-btn" onclick="editCast('+i+')">✏ 編集</button>'+
          '<button class="cast-toggle-btn" onclick="toggleActive(this,'+i+')">'+( c.active?'✓ 出勤中':'○ 休み')+'</button>'+
        '</div>'+
      '</div>'+
      '<div class="cast-info">'+
        '<div class="cast-name-row">'+
          '<strong class="cast-name">'+c.name+'</strong>'+
          '<span class="cast-active '+(c.active?'on':'off')+'">'+( c.active?'● 出勤中':'○ 休み')+'</span>'+
        '</div>'+
        '<div class="cast-meta">AGE '+c.age+' · T'+c.height+' ('+c.cup+')</div>'+
      '</div>'+
    '</div>';
  }).join('');
  updateStats();
}

function showTab(name, el) {
  document.querySelectorAll('.tab-panel').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.nav-item').forEach(n=>n.classList.remove('active'));
  document.getElementById('tab-'+name).classList.add('active');
  if(el) el.classList.add('active');
  const titles={cast:'キャスト管理',schedule:'出勤スケジュール',lp:'LP プレビュー',settings:'設定'};
  document.getElementById('topbar-title').textContent=titles[name]||name;
}

function filterCast(q) {
  document.querySelectorAll('.cast-card').forEach(c=>{
    c.style.display=c.dataset.name.toLowerCase().includes(q.toLowerCase())?'':'none';
  });
}

function filterRank(rank, btn) {
  document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  document.querySelectorAll('.cast-card').forEach(c=>{
    if(rank==='ALL') c.style.display='';
    else if(rank==='active') c.style.display=!c.classList.contains('inactive')?'':'none';
    else c.style.display=c.dataset.rank===rank?'':'none';
  });
}

function toggleActive(btn, idx) {
  CAST_DATA[idx].active = !CAST_DATA[idx].active;
  const card = btn.closest('.cast-card');
  card.classList.toggle('inactive');
  const statusEl = card.querySelector('.cast-active');
  const active = CAST_DATA[idx].active;
  statusEl.textContent = active?'● 出勤中':'○ 休み';
  statusEl.className = 'cast-active '+(active?'on':'off');
  btn.textContent = active?'✓ 出勤中':'○ 休み中';
  showToast((active?'出勤中':'休み')+'に変更しました');
  updateStats();
}

function editCast(idx) {
  const c = CAST_DATA[idx];
  currentEditCard = idx;
  document.getElementById('modal-title').textContent = c.name+' を編集';
  document.getElementById('edit-img').value = c.img;
  document.getElementById('edit-name').value = c.name;
  document.getElementById('edit-age').value = c.age;
  document.getElementById('edit-height').value = c.height;
  document.getElementById('edit-cup').value = c.cup;
  document.getElementById('edit-rank').value = c.rank;
  document.getElementById('edit-comment').value = c.desc;
  document.getElementById('prev-img').style.backgroundImage = "url('"+c.img+"')";
  document.getElementById('editModal').classList.add('show');
}

function openAddModal() {
  currentEditCard = null;
  document.getElementById('modal-title').textContent = '新規キャスト追加';
  ['edit-img','edit-name','edit-age','edit-height','edit-comment'].forEach(id=>document.getElementById(id).value='');
  document.getElementById('edit-cup').value='D';
  document.getElementById('edit-rank').value='NEW FACE';
  document.getElementById('prev-img').style.backgroundImage='';
  document.getElementById('editModal').classList.add('show');
}

function updatePreview(url){document.getElementById('prev-img').style.backgroundImage="url('"+url+"')";}

function closeModal(){document.getElementById('editModal').classList.remove('show');currentEditCard=null;}

function saveCast() {
  const name=document.getElementById('edit-name').value;
  const age=document.getElementById('edit-age').value;
  const height=document.getElementById('edit-height').value;
  const cup=document.getElementById('edit-cup').value;
  const rank=document.getElementById('edit-rank').value;
  const img=document.getElementById('edit-img').value;
  const desc=document.getElementById('edit-comment').value;
  if(currentEditCard!==null){
    CAST_DATA[currentEditCard]={...CAST_DATA[currentEditCard],name,age,height,cup,rank,img,desc};
    showToast(name+' を更新しました');
  } else {
    CAST_DATA.push({rank,name,age,height,cup,img,desc,active:true});
    showToast(name+' を追加しました');
  }
  renderGrid(CAST_DATA);
  closeModal();
}

function deleteCast() {
  if(currentEditCard!==null && confirm('本当に削除しますか？')){
    const name=CAST_DATA[currentEditCard].name;
    CAST_DATA.splice(currentEditCard,1);
    renderGrid(CAST_DATA);
    showToast(name+' を削除しました');
    closeModal();
  }
}

function updateStats(){
  const all=CAST_DATA.length;
  const active=CAST_DATA.filter(c=>c.active).length;
  const premium=CAST_DATA.filter(c=>c.rank==='PREMIUM').length;
  const special=CAST_DATA.filter(c=>c.rank==='SPECIAL').length;
  document.getElementById('stat-total').textContent=all;
  document.getElementById('stat-active').textContent=active;
  document.getElementById('stat-premium').textContent=premium;
  document.getElementById('stat-special').textContent=special;
}

function showToast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg;t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2500);
}

function buildSchedule(){
  const days=['月','火','水','木','金','土','日'];
  const grid=document.getElementById('scheduleGrid');
  const today=new Date();
  grid.innerHTML=days.map((d,i)=>{
    const date=new Date(today);
    date.setDate(today.getDate()-today.getDay()+1+i);
    const cast=CAST_DATA.filter(c=>c.active).slice(i*2,(i+1)*2);
    return '<div class="day-col"><div class="day-label">'+d+'<br>'+(date.getMonth()+1)+'/'+(date.getDate())+'</div>'+
      cast.map(c=>'<div class="day-cast">'+c.name+'</div>').join('')+'</div>';
  }).join('');
}

document.getElementById('editModal').addEventListener('click',e=>{if(e.target===document.getElementById('editModal'))closeModal();});

renderGrid(CAST_DATA);
buildSchedule();
</script>
</body>
</html>

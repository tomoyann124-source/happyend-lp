<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Massage Tokyo – 管理画面</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;font-family:Inter,"Noto Sans JP",sans-serif;font-size:14px;background:#f5f5f7;color:#1d1d1f}
a{text-decoration:none;color:inherit}
button,input,select,textarea{font-family:inherit}
:root{
  --gold:#b8986a;--gold2:#d4b98a;--goldbg:rgba(184,152,106,.1);
  --green:#34c759;--red:#ff3b30;--purple:#8b5cf6;
  --bd:#d1d1d6;--bd2:#e5e5ea;--w:#fff;--bg:#f5f5f7;--bg2:#ececf0;
  --txt:#1d1d1f;--txt2:#6e6e73;--sh:0 1px 3px rgba(0,0,0,.08)
}
.app{display:flex;height:100vh;overflow:hidden}
/* SIDEBAR */
.sb{width:220px;background:var(--w);border-right:1px solid var(--bd2);display:flex;flex-direction:column;flex-shrink:0}
.sb-logo{padding:18px 20px;border-bottom:1px solid var(--bd2)}
.sb-logo h1{font-size:15px;font-weight:700}
.sb-logo p{font-size:11px;color:var(--txt2);margin-top:2px}
.sb-nav{padding:12px 10px;flex:1}
.sb-label{font-size:10px;font-weight:600;color:var(--txt2);text-transform:uppercase;letter-spacing:.08em;padding:0 10px;margin-bottom:4px;display:block}
.nav-btn{width:100%;display:flex;align-items:center;gap:10px;padding:9px 10px;border-radius:8px;border:none;background:none;color:var(--txt2);font-size:13px;font-weight:500;cursor:pointer;transition:all .15s;text-align:left;margin-bottom:2px}
.nav-btn:hover{background:var(--bg);color:var(--txt)}
.nav-btn.on{background:var(--goldbg);color:var(--gold)}
.nav-btn svg{width:16px;height:16px;flex-shrink:0}
.sb-foot{margin-top:auto;padding:12px 10px;border-top:1px solid var(--bd2)}
.sb-foot a{display:flex;align-items:center;gap:8px;padding:8px 10px;border-radius:8px;font-size:12px;color:var(--txt2);transition:all .15s}.sb-foot a:hover{background:var(--bg);color:var(--txt)}
/* MAIN */
.main{flex:1;display:flex;flex-direction:column;overflow:hidden}
.topbar{height:56px;background:var(--w);border-bottom:1px solid var(--bd2);padding:0 24px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.topbar h2{font-size:16px;font-weight:600}
.topbar-r{display:flex;gap:8px}
.content{flex:1;overflow-y:auto;padding:24px}
/* BUTTONS */
.btn{display:inline-flex;align-items:center;gap:6px;padding:8px 16px;border-radius:8px;font-size:13px;font-weight:500;border:none;cursor:pointer;transition:all .15s;white-space:nowrap}
.btn-gold{background:var(--gold);color:#fff}.btn-gold:hover{background:var(--gold2)}
.btn-wh{background:var(--w);color:var(--txt);border:1px solid var(--bd)}.btn-wh:hover{border-color:var(--gold);color:var(--gold)}
.btn-red{background:#fff0f0;color:var(--red);border:1px solid #fecaca}.btn-red:hover{background:#ffcdd2}
.btn-sm{padding:6px 12px;font-size:12px;border-radius:6px}
.btn-xs{padding:4px 10px;font-size:11px;border-radius:5px}
/* TABS */
.tab{display:none}.tab.on{display:block}
/* ===== TODAY ===== */
.today-hd{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px}
.today-date{font-size:22px;font-weight:700}
.today-date span{font-size:14px;font-weight:400;color:var(--txt2);margin-left:6px}
.on-badge{display:inline-flex;align-items:center;gap:5px;background:#ecfdf5;color:var(--green);font-size:13px;font-weight:600;padding:6px 14px;border-radius:999px;border:1px solid rgba(52,199,89,.2)}
.on-badge::before{content:"";width:7px;height:7px;border-radius:50%;background:var(--green);animation:pulse 1.5s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.stat-row{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:24px}
.stat{background:var(--w);border:1px solid var(--bd2);border-radius:10px;padding:16px;box-shadow:var(--sh)}
.stat-n{font-size:26px;font-weight:700;line-height:1}
.stat-l{font-size:11px;color:var(--txt2);margin-top:4px;font-weight:500}
.today-cast-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:12px}
.today-card{background:var(--w);border:1px solid var(--bd2);border-radius:10px;overflow:hidden;box-shadow:var(--sh)}
.today-photo{width:100%;aspect-ratio:3/4;background-size:cover;background-position:center top;position:relative}
.today-rank{position:absolute;top:7px;left:7px;font-size:9px;font-weight:700;padding:2px 7px;border-radius:999px;color:#fff;text-transform:uppercase;letter-spacing:.05em}
.today-name{padding:8px 8px 2px;font-size:13px;font-weight:600}
.today-meta{padding:0 8px 4px;font-size:11px;color:var(--txt2)}
/* シフト時間バッジ */
.today-time{padding:0 8px 8px;font-size:11px;color:var(--gold);font-weight:600;display:flex;align-items:center;gap:4px}
.today-time svg{width:11px;height:11px;flex-shrink:0}
.no-shift{text-align:center;padding:48px 20px;color:var(--txt2);grid-column:1/-1}
.no-shift-icon{font-size:36px;margin-bottom:10px}
.no-shift p{font-size:13px;line-height:1.6}
/* ===== SHIFT ===== */
.shift-nav{display:flex;align-items:center;gap:12px;margin-bottom:16px}
.shift-nav-label{font-size:15px;font-weight:600;flex:1;text-align:center}
.week-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:8px;margin-bottom:20px}
.day-col{background:var(--w);border:1px solid var(--bd2);border-radius:10px;min-height:160px;box-shadow:var(--sh);overflow:hidden}
.day-col.is-today{border:2px solid var(--gold)}
.day-hd{padding:10px 10px 8px;border-bottom:1px solid var(--bd2)}
.day-dn{font-size:10px;font-weight:600;color:var(--txt2);text-transform:uppercase;letter-spacing:.06em}
.day-dt{font-size:15px;font-weight:700;margin-top:2px}
.day-col.is-today .day-dt{color:var(--gold)}
.day-bd{padding:8px;display:flex;flex-direction:column;gap:4px}
/* シフトチップ（時間付き） */
.shift-chip{background:var(--goldbg);border:1px solid rgba(184,152,106,.25);border-radius:5px;padding:5px 7px;display:flex;align-items:flex-start;justify-content:space-between;gap:4px}
.shift-chip-info{flex:1;min-width:0}
.shift-chip-name{font-size:11px;font-weight:600;color:var(--gold);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.shift-chip-time{font-size:10px;color:var(--gold);opacity:.75;margin-top:1px}
.chip-del{border:none;background:none;color:rgba(184,152,106,.5);cursor:pointer;font-size:14px;line-height:1;padding:0;flex-shrink:0}.chip-del:hover{color:var(--red)}
.day-add{border:1px dashed var(--bd);border-radius:5px;padding:5px;font-size:11px;color:var(--txt2);background:none;cursor:pointer;width:100%;text-align:center;transition:all .15s;margin-top:2px}.day-add:hover{border-color:var(--gold);color:var(--gold)}
/* シフト追加パネル */
.shift-select-box{background:var(--w);border:1px solid var(--bd2);border-radius:10px;padding:16px;margin-bottom:20px;box-shadow:var(--sh)}
.shift-select-hd{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.shift-select-hd h4{font-size:13px;font-weight:600}
/* 時間選択UI */
.time-row{display:flex;align-items:center;gap:10px;padding:12px;background:var(--bg);border-radius:8px;margin-bottom:12px;flex-wrap:wrap;gap:8px}
.time-row label{font-size:12px;font-weight:600;color:var(--txt2);white-space:nowrap}
.time-select{padding:6px 10px;border:1px solid var(--bd);border-radius:6px;font-size:12px;font-family:inherit;background:var(--w);color:var(--txt);outline:none;cursor:pointer}.time-select:focus{border-color:var(--gold)}
.time-sep{font-size:12px;color:var(--txt2);font-weight:500}
.cast-picker{display:grid;grid-template-columns:repeat(auto-fill,minmax(100px,1fr));gap:8px}
.picker-item{border:1px solid var(--bd2);border-radius:8px;padding:8px 6px;cursor:pointer;text-align:center;transition:all .15s;background:var(--w);position:relative}
.picker-item:hover{border-color:var(--gold)}
.picker-item.sel{border-color:var(--gold);background:var(--goldbg)}
.picker-item.sel::after{content:"✓";position:absolute;top:4px;right:6px;font-size:11px;color:var(--gold);font-weight:700}
.picker-photo{width:44px;height:58px;border-radius:5px;background-size:cover;background-position:center top;margin:0 auto 5px}
.picker-name{font-size:11px;font-weight:600}
.picker-meta{font-size:10px;color:var(--txt2)}
.shift-select-ft{margin-top:12px;text-align:right}
/* ===== CAST ===== */
.cast-toolbar{display:flex;gap:10px;margin-bottom:16px;flex-wrap:wrap;align-items:center}
.search-box{flex:1;min-width:180px;padding:8px 14px;border:1px solid var(--bd);border-radius:8px;font-size:13px;outline:none;background:var(--w);transition:border-color .15s}.search-box:focus{border-color:var(--gold);box-shadow:0 0 0 3px rgba(184,152,106,.1)}
.rank-tabs{display:flex;gap:3px;background:var(--bg2);border-radius:8px;padding:3px}
.rank-tab{padding:5px 12px;border-radius:6px;border:none;background:none;font-size:12px;font-weight:500;color:var(--txt2);cursor:pointer;transition:all .15s}
.rank-tab.on{background:var(--w);color:var(--txt);box-shadow:var(--sh)}
.cast-admin-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(155px,1fr));gap:14px}
.cast-card{background:var(--w);border:1px solid var(--bd2);border-radius:10px;overflow:hidden;box-shadow:var(--sh);transition:all .2s}
.cast-card:hover{border-color:var(--gold);box-shadow:0 4px 16px rgba(0,0,0,.1);transform:translateY(-2px)}
.cast-card.inactive{opacity:.5}
.cast-photo{width:100%;aspect-ratio:3/4;background-size:cover;background-position:center top;position:relative;overflow:hidden}
.cast-overlay{position:absolute;inset:0;background:rgba(0,0,0,.55);opacity:0;display:flex;align-items:center;justify-content:center;transition:opacity .2s}
.cast-card:hover .cast-overlay{opacity:1}
.cast-rank-badge{position:absolute;top:8px;left:8px;font-size:9px;font-weight:700;padding:2px 7px;border-radius:999px;color:#fff;text-transform:uppercase}
.rank-nf{background:#34c759}.rank-pm{background:var(--gold)}.rank-sp{background:var(--purple)}
.status-pill{position:absolute;top:8px;right:8px;font-size:9px;font-weight:600;padding:2px 6px;border-radius:999px}
.stt-on{background:#ecfdf5;color:var(--green)}.stt-off{background:#f5f5f7;color:var(--txt2)}
.cast-info{padding:10px}
.cast-name{font-size:13px;font-weight:600;margin-bottom:2px}
.cast-meta-t{font-size:11px;color:var(--txt2)}
.cast-actions{display:flex;gap:5px;padding:0 10px 10px}
/* ===== MODAL ===== */
.modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.38);z-index:1000;align-items:center;justify-content:center;padding:16px;backdrop-filter:blur(3px)}
.modal-bg.on{display:flex}
.modal{background:var(--w);border-radius:14px;width:min(540px,100%);max-height:90vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,.2)}
.modal-hd{padding:18px 22px 14px;border-bottom:1px solid var(--bd2);display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;background:var(--w);z-index:1;border-radius:14px 14px 0 0}
.modal-hd h3{font-size:15px;font-weight:600}
.modal-x{width:26px;height:26px;border-radius:6px;border:none;background:var(--bg);cursor:pointer;font-size:16px;color:var(--txt2);transition:background .15s}.modal-x:hover{background:var(--bd2)}
.modal-prev{padding:18px 22px 0;display:flex;align-items:center;gap:14px;background:var(--bg);border-bottom:1px solid var(--bd2);padding-bottom:16px}
.prev-photo{width:60px;height:80px;border-radius:8px;background-size:cover;background-position:center top;background-color:var(--bg2);border:1px solid var(--bd2);flex-shrink:0}
.prev-name{font-size:15px;font-weight:600}
.prev-sub{font-size:11px;color:var(--txt2);margin-top:2px}
.modal-body{padding:20px 22px}
.fg2{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.fg{display:flex;flex-direction:column;gap:5px}.fg.full{grid-column:1/-1}
.fl{font-size:11px;font-weight:600;color:var(--txt2);text-transform:uppercase;letter-spacing:.05em}
.fi{padding:9px 12px;border:1px solid var(--bd);border-radius:7px;font-size:13px;color:var(--txt);outline:none;transition:border-color .15s;width:100%;background:var(--w)}.fi:focus{border-color:var(--gold);box-shadow:0 0 0 3px rgba(184,152,106,.1)}
.modal-ft{padding:14px 22px;border-top:1px solid var(--bd2);display:flex;justify-content:space-between;position:sticky;bottom:0;background:var(--w)}
.modal-ft-r{display:flex;gap:8px}
/* TOAST */
.toast{position:fixed;bottom:20px;right:20px;background:#1d1d1f;color:#fff;padding:11px 18px;border-radius:10px;font-size:13px;font-weight:500;z-index:9999;opacity:0;transform:translateY(6px);transition:all .25s;pointer-events:none;box-shadow:0 4px 20px rgba(0,0,0,.2)}
.toast.on{opacity:1;transform:translateY(0)}
.toast.ok{background:var(--green)}
</style>
</head>
<body>
<div class="app">

<!-- SIDEBAR -->
<aside class="sb">
  <div class="sb-logo">
    <h1>Massage Tokyo</h1>
    <p>Admin Dashboard</p>
  </div>
  <div class="sb-nav">
    <span class="sb-label">メニュー</span>
    <button class="nav-btn on" onclick="gotoTab('today',this)">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9,22 9,12 15,12 15,22"/></svg>
      今日の出勤
    </button>
    <button class="nav-btn" onclick="gotoTab('shift',this)">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><path d="M16 2v4M8 2v4M3 10h18"/></svg>
      シフト管理
    </button>
    <button class="nav-btn" onclick="gotoTab('cast',this)">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/></svg>
      キャスト管理
    </button>
  </div>
  <div class="sb-foot">
    <a href="https://c-t0922.github.io/happyend-lp/" target="_blank">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15,3 21,3 21,9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>
      LPサイトを見る
    </a>
  </div>
</aside>

<!-- MAIN -->
<div class="main">
  <div class="topbar">
    <h2 id="topTitle">今日の出勤</h2>
    <div class="topbar-r" id="topbarActions"></div>
  </div>
  <div class="content">

    <!-- TODAY TAB -->
    <div class="tab on" id="tab-today">
      <div class="today-hd">
        <div class="today-date" id="todayLabel"></div>
        <div class="on-badge" id="onBadge">0名出勤中</div>
      </div>
      <div class="stat-row">
        <div class="stat"><div class="stat-n" id="sTotal">0</div><div class="stat-l">総キャスト</div></div>
        <div class="stat"><div class="stat-n" id="sToday" style="color:var(--green)">0</div><div class="stat-l">今日の出勤</div></div>
        <div class="stat"><div class="stat-n" id="sPm" style="color:var(--gold)">0</div><div class="stat-l">PREMIUM</div></div>
        <div class="stat"><div class="stat-n" id="sSp" style="color:var(--purple)">0</div><div class="stat-l">SPECIAL</div></div>
      </div>
      <h3 style="font-size:14px;font-weight:600;margin-bottom:12px">📅 本日の出勤キャスト</h3>
      <div class="today-cast-grid" id="todayGrid"></div>
    </div>

    <!-- SHIFT TAB -->
    <div class="tab" id="tab-shift">
      <div class="shift-nav">
        <button class="btn btn-wh btn-sm" onclick="prevW()">← 前週</button>
        <div class="shift-nav-label" id="weekLabel">-</div>
        <button class="btn btn-wh btn-sm" onclick="nextW()">次週 →</button>
      </div>
      <div class="week-grid" id="weekGrid"></div>
      <div class="shift-select-box" id="shiftSelectBox" style="display:none">
        <div class="shift-select-hd">
          <h4 id="shiftSelectLabel">出勤キャストを選ぶ</h4>
          <button class="btn btn-wh btn-sm" onclick="closeShiftPicker()">✕ 閉じる</button>
        </div>
        <!-- 時間選択 -->
        <div class="time-row">
          <label>⏰ 出勤時間帯：</label>
          <select class="time-select" id="timeStart"></select>
          <span class="time-sep">〜</span>
          <select class="time-select" id="timeEnd"></select>
          <span style="font-size:11px;color:var(--txt2);margin-left:4px">※キャスト個別に設定可能</span>
        </div>
        <div class="cast-picker" id="castPicker"></div>
        <div class="shift-select-ft">
          <button class="btn btn-gold btn-sm" onclick="applyShift()">シフトに登録する</button>
        </div>
      </div>
    </div>

    <!-- CAST TAB -->
    <div class="tab" id="tab-cast">
      <div class="cast-toolbar">
        <input type="text" class="search-box" placeholder="🔍 名前で検索..." id="castSearch" oninput="renderCast()">
        <div class="rank-tabs" id="rankTabs">
          <button class="rank-tab on" onclick="setRank('ALL',this)">すべて</button>
          <button class="rank-tab" onclick="setRank('NEW FACE',this)">NEW FACE</button>
          <button class="rank-tab" onclick="setRank('PREMIUM',this)">PREMIUM</button>
          <button class="rank-tab" onclick="setRank('SPECIAL',this)">SPECIAL</button>
        </div>
      </div>
      <div class="cast-admin-grid" id="castAdminGrid"></div>
    </div>

  </div>
</div>
</div>

<!-- MODAL -->
<div class="modal-bg" id="modalBg">
  <div class="modal">
    <div class="modal-hd">
      <h3 id="modalTitle">キャスト編集</h3>
      <button class="modal-x" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-prev" id="modalPrev">
      <div class="prev-photo" id="prevPhoto"></div>
      <div><div class="prev-name" id="prevName">-</div><div class="prev-sub" id="prevSub">-</div></div>
    </div>
    <div class="modal-body">
      <div class="fg2">
        <div class="fg full"><label class="fl">プロフィール画像 URL</label><input class="fi" id="fImg" placeholder="https://..." oninput="onImgChange()"></div>
        <div class="fg"><label class="fl">名前</label><input class="fi" id="fName" placeholder="キャスト名" oninput="onNameChange()"></div>
        <div class="fg"><label class="fl">ランク</label><select class="fi" id="fRank" onchange="onRankChange()"><option value="NEW FACE">NEW FACE</option><option value="PREMIUM">PREMIUM</option><option value="SPECIAL">SPECIAL</option></select></div>
        <div class="fg"><label class="fl">年齢</label><input class="fi" id="fAge" type="number" min="18" max="50" placeholder="24"></div>
        <div class="fg"><label class="fl">身長 cm</label><input class="fi" id="fHeight" type="number" min="140" max="185" placeholder="160"></div>
        <div class="fg"><label class="fl">カップ数</label><select class="fi" id="fCup"><option>A</option><option>B</option><option>C</option><option selected>D</option><option>E</option><option>F</option><option>G</option><option>H</option><option>I</option></select></div>
        <div class="fg"><label class="fl">ステータス</label><select class="fi" id="fActive"><option value="1">● 出勤中</option><option value="0">○ 休み</option></select></div>
        <div class="fg full"><label class="fl">コメント</label><textarea class="fi" id="fDesc" rows="3" placeholder="プロフィールコメント..."></textarea></div>
      </div>
    </div>
    <div class="modal-ft">
      <button class="btn btn-red btn-sm" id="delBtn" onclick="doDelete()" style="display:none">削除する</button>
      <div class="modal-ft-r">
        <button class="btn btn-wh btn-sm" onclick="closeModal()">キャンセル</button>
        <button class="btn btn-gold btn-sm" onclick="doSave()">保存する</button>
      </div>
    </div>
  </div>
</div>

<div class="toast" id="toastEl"></div>

<script>
/* ========================
   DATA
======================== */
var DEFAULT_CAST = [
  {id:1,rank:"NEW FACE",name:"Airis",age:"26",height:"163",cup:"D",desc:"Irresistibly cute with maximum charm and a sexy edge.",img:"https://best-massage-tokyo.com/wp-content/uploads/2026/04/1775374488393.jpg",active:1},

function loadC(){try{var s=localStorage.getItem("mt_cast");return s?JSON.parse(s):DEFAULT_CAST;}catch(e){return DEFAULT_CAST;}}
function saveC(){localStorage.setItem("mt_cast",JSON.stringify(CAST));}
// SHIFTS format: { "2026-04-09": [ {id, start, end}, ... ] }
function loadSh(){try{var s=localStorage.getItem("mt_shifts2");return s?JSON.parse(s):{};}catch(e){return {};}}
function saveSh(){localStorage.setItem("mt_shifts2",JSON.stringify(SHIFTS));}

var CAST = loadC();
var SHIFTS = loadSh();
var rankFlt = "ALL";
var editIdx = null;
var shiftDK = null;
var weekOff = 0;

function dKey(d){return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0");}
function todayDK(){return dKey(new Date());}

/* 時間オプション生成（10:00〜29:00） */
function buildTimeOptions(){
  var opts = [];
  for(var h=10;h<=29;h++){
    opts.push(String(h).padStart(2,"0")+":00");
    if(h<29) opts.push(String(h).padStart(2,"0")+":30");
  }
  return opts;
}
var TIME_OPTIONS = buildTimeOptions();
function populateTimeSelect(selId, defaultVal){
  var sel = document.getElementById(selId);
  sel.innerHTML = TIME_OPTIONS.map(function(t){
    return '<option value="'+t+'"'+(t===defaultVal?' selected':'')+'>'+t+'</option>';
  }).join('');
}

/* ========================
   TABS
======================== */
function gotoTab(name, btn){
  document.querySelectorAll(".tab").forEach(function(t){t.classList.remove("on");});
  document.querySelectorAll(".nav-btn").forEach(function(b){b.classList.remove("on");});
  document.getElementById("tab-"+name).classList.add("on");
  if(btn) btn.classList.add("on");
  var titles={today:"今日の出勤",shift:"シフト管理",cast:"キャスト管理"};
  document.getElementById("topTitle").textContent=titles[name]||name;
  var acts=document.getElementById("topbarActions");
  if(name==="cast"){acts.innerHTML='<button class="btn btn-gold btn-sm" onclick="openAdd()">＋ キャスト追加</button>';}
  else{acts.innerHTML="";}
  if(name==="today") renderToday();
  if(name==="shift") renderShift();
  if(name==="cast") renderCast();
}

/* ========================
   TODAY
======================== */
function renderToday(){
  var now = new Date();
  var dnames = ["日","月","火","水","木","金","土"];
  var mnames = ["1月","2月","3月","4月","5月","6月","7月","8月","9月","10月","11月","12月"];
  document.getElementById("todayLabel").innerHTML = mnames[now.getMonth()]+now.getDate()+"日 <span>("+dnames[now.getDay()]+")</span>";
  var key = todayDK();
  var entries = SHIFTS[key] || [];
  var todayCast = entries.map(function(e){
    var c = CAST.find(function(x){return x.id===e.id;});
    if(!c) return null;
    return {cast:c, start:e.start, end:e.end};
  }).filter(Boolean);
  document.getElementById("onBadge").textContent = todayCast.length+"名出勤中";
  document.getElementById("sTotal").textContent = CAST.length;
  document.getElementById("sToday").textContent = todayCast.length;
  document.getElementById("sPm").textContent = CAST.filter(function(c){return c.rank==="PREMIUM";}).length;
  document.getElementById("sSp").textContent = CAST.filter(function(c){return c.rank==="SPECIAL";}).length;
  var grid = document.getElementById("todayGrid");
  if(!todayCast.length){
    grid.innerHTML = '<div class="no-shift"><div class="no-shift-icon">📅</div><p>今日のシフトが登録されていません<br><br>'
      +'<button class="btn btn-gold btn-sm" onclick="gotoTab(\'shift\',document.querySelectorAll(\'.nav-btn\')[1])">シフトを登録する</button></p></div>';
    return;
  }
  grid.innerHTML = todayCast.map(function(item){
    var c=item.cast;
    var rc=c.rank==="PREMIUM"?"rank-pm":c.rank==="SPECIAL"?"rank-sp":"rank-nf";
    var timeStr = (item.start&&item.end) ? item.start+"〜"+item.end : "";
    return '<div class="today-card">'
      +'<div class="today-photo" style="background-image:url(\''+c.img+'\')">'
      +'<span class="today-rank '+rc+'">'+c.rank+'</span>'
      +'</div>'
      +'<div class="today-name">'+c.name+'</div>'
      +'<div class="today-meta">AGE '+c.age+' T'+c.height+' ('+c.cup+')</div>'
      +(timeStr?'<div class="today-time"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12,6 12,12 16,14"/></svg>'+timeStr+'</div>':'')
      +'</div>';
  }).join("");
}

/* ========================
   SHIFT
======================== */
function getWeekDates(off){
  var today=new Date();
  var dow=today.getDay();
  var mon=new Date(today);
  mon.setDate(today.getDate()-(dow===0?6:dow-1)+(off*7));
  var arr=[];
  for(var i=0;i<7;i++){var d=new Date(mon);d.setDate(mon.getDate()+i);arr.push(d);}
  return arr;
}
function renderShift(){
  var dates=getWeekDates(weekOff);
  var dayNm=["月","火","水","木","金","土","日"];
  var tdk=todayDK();
  var f=dates[0],l=dates[6];
  document.getElementById("weekLabel").textContent=(f.getMonth()+1)+"/"+f.getDate()+" 〜 "+(l.getMonth()+1)+"/"+l.getDate();
  var html="";
  dates.forEach(function(d,i){
    var key=dKey(d);
    var isT=key===tdk;
    var entries=SHIFTS[key]||[];
    var chips=entries.map(function(e){
      var c=CAST.find(function(x){return x.id===e.id;});
      if(!c) return "";
      var timeStr=(e.start&&e.end)?e.start+"〜"+e.end:"時間未設定";
      return '<div class="shift-chip">'
        +'<div class="shift-chip-info">'
        +'<div class="shift-chip-name">'+c.name+'</div>'
        +'<div class="shift-chip-time">'+timeStr+'</div>'
        +'</div>'
        +'<button class="chip-del" onclick="rmShift(\''+key+'\','+e.id+')">×</button>'
        +'</div>';
    }).join("");
    html+='<div class="day-col'+(isT?" is-today":"")+'">'
      +'<div class="day-hd"><div class="day-dn">'+dayNm[i]+'</div><div class="day-dt">'+(d.getMonth()+1)+"/"+(d.getDate())+'</div></div>'
      +'<div class="day-bd">'+chips
      +'<button class="day-add" onclick="openShiftPicker(\''+key+'\')">+ 追加</button>'
      +'</div></div>';
  });
  document.getElementById("weekGrid").innerHTML=html;
  document.getElementById("shiftSelectBox").style.display="none";
}
function prevW(){weekOff--;renderShift();}
function nextW(){weekOff++;renderShift();}

function openShiftPicker(key){
  shiftDK=key;
  var d=new Date(key);
  document.getElementById("shiftSelectLabel").textContent=(d.getMonth()+1)+"/"+d.getDate()+"のシフト登録";
  // 時間セレクトを生成（デフォルト：12:00〜29:00）
  populateTimeSelect("timeStart","12:00");
  populateTimeSelect("timeEnd","29:00");
  var cur=(SHIFTS[key]||[]).map(function(e){return e.id;});
  document.getElementById("castPicker").innerHTML=CAST.map(function(c){
    var sel=cur.indexOf(c.id)>=0;
    var rc=c.rank==="PREMIUM"?"rank-pm":c.rank==="SPECIAL"?"rank-sp":"rank-nf";
    return '<div class="picker-item'+(sel?" sel":"")+'" id="pi-'+c.id+'" onclick="togglePick('+c.id+')">'
      +'<div class="picker-photo" style="background-image:url(\''+c.img+'\');position:relative">'
      +'<span style="position:absolute;top:3px;left:3px;font-size:8px;font-weight:700;padding:1px 5px;border-radius:999px;color:#fff" class="'+rc+'">'+c.rank.charAt(0)+'</span>'
      +'</div>'
      +'<div class="picker-name">'+c.name+'</div>'
      +'<div class="picker-meta">T'+c.height+'</div>'
      +'</div>';
  }).join("");
  var box=document.getElementById("shiftSelectBox");
  box.style.display="";
  setTimeout(function(){box.scrollIntoView({behavior:"smooth",block:"nearest"});},100);
}
function togglePick(id){
  var el=document.getElementById("pi-"+id);
  if(el) el.classList.toggle("sel");
}
function applyShift(){
  if(!shiftDK) return;
  var start=document.getElementById("timeStart").value;
  var end=document.getElementById("timeEnd").value;
  if(start>=end){showToast("終了時間は開始時間より後にしてください");return;}
  var selIds=[];
  document.querySelectorAll(".picker-item.sel").forEach(function(el){
    selIds.push(parseInt(el.id.replace("pi-","")));
  });
  // 既存エントリを保持しつつ、選択されたキャストを更新
  var existing=(SHIFTS[shiftDK]||[]).filter(function(e){return selIds.indexOf(e.id)<0;});
  var newEntries=selIds.map(function(id){return {id:id,start:start,end:end};});
  SHIFTS[shiftDK]=existing.concat(newEntries);
  saveSh();
  renderShift();
  if(shiftDK===todayDK()) renderToday();
  showToast("シフトを保存しました（"+start+"〜"+end+"）","ok");
}
function rmShift(key,id){
  if(!SHIFTS[key]) return;
  SHIFTS[key]=SHIFTS[key].filter(function(e){return e.id!==id;});
  if(SHIFTS[key].length===0) delete SHIFTS[key];
  saveSh();
  renderShift();
  if(key===todayDK()) renderToday();
}
function closeShiftPicker(){
  document.getElementById("shiftSelectBox").style.display="none";
  shiftDK=null;
}

/* ========================
   CAST
======================== */
function setRank(r,btn){
  rankFlt=r;
  document.querySelectorAll(".rank-tab").forEach(function(b){b.classList.remove("on");});
  btn.classList.add("on");
  renderCast();
}
function renderCast(){
  var q=(document.getElementById("castSearch").value||"").toLowerCase();
  var list=CAST.filter(function(c){
    if(q&&!c.name.toLowerCase().includes(q)) return false;
    if(rankFlt!=="ALL"&&c.rank!==rankFlt) return false;
    return true;
  });
  var grid=document.getElementById("castAdminGrid");
  if(!list.length){grid.innerHTML='<p style="color:var(--txt2);padding:24px;text-align:center">該当するキャストが見つかりません</p>';return;}
  grid.innerHTML=list.map(function(c){
    var idx=CAST.indexOf(c);
    var rc=c.rank==="PREMIUM"?"rank-pm":c.rank==="SPECIAL"?"rank-sp":"rank-nf";
    return '<div class="cast-card'+(!c.active?" inactive":"")+'">'
      +'<div class="cast-photo" style="background-image:url(\''+c.img+'\')">'
      +'<span class="cast-rank-badge '+rc+'">'+c.rank+'</span>'
      +'<span class="status-pill '+(c.active?"stt-on":"stt-off")+'">'+(c.active?"● 出勤":"○ 休み")+'</span>'
      +'<div class="cast-overlay"><button class="btn btn-wh btn-xs" onclick="openEdit('+idx+')">✏ 編集</button></div>'
      +'</div>'
      +'<div class="cast-info"><div class="cast-name">'+c.name+'</div><div class="cast-meta-t">AGE '+c.age+' · T'+c.height+' ('+c.cup+')</div></div>'
      +'<div class="cast-actions">'
      +'<button class="btn btn-wh btn-xs" style="flex:1" onclick="openEdit('+idx+')">✏ 編集</button>'
      +'<button class="btn btn-xs '+(c.active?"btn-wh":"btn-gold")+'" style="flex:1" onclick="toggleStt('+idx+')">'+(c.active?"→休み":"→出勤")+'</button>'
      +'</div></div>';
  }).join("");
}
function toggleStt(idx){
  CAST[idx].active=CAST[idx].active?0:1;
  saveC();
  renderCast();
  showToast(CAST[idx].name+(CAST[idx].active?" を出勤中に":" を休みに")+"しました","ok");
}

/* ========================
   MODAL
======================== */
function openEdit(idx){
  editIdx=idx;
  var c=CAST[idx];
  document.getElementById("modalTitle").textContent=c.name+" を編集";
  document.getElementById("fImg").value=c.img||"";
  document.getElementById("fName").value=c.name||"";
  document.getElementById("fRank").value=c.rank||"NEW FACE";
  document.getElementById("fAge").value=c.age||"";
  document.getElementById("fHeight").value=c.height||"";
  document.getElementById("fCup").value=c.cup||"D";
  document.getElementById("fActive").value=c.active?1:0;
  document.getElementById("fDesc").value=c.desc||"";
  document.getElementById("prevPhoto").style.backgroundImage="url('"+c.img+"')";
  document.getElementById("prevName").textContent=c.name;
  document.getElementById("prevSub").textContent=c.rank+" · AGE "+c.age+" T"+c.height+" ("+c.cup+")";
  document.getElementById("delBtn").style.display="";
  document.getElementById("modalBg").classList.add("on");
}
function openAdd(){
  editIdx=null;
  document.getElementById("modalTitle").textContent="新規キャスト追加";
  ["fImg","fName","fAge","fHeight","fDesc"].forEach(function(id){document.getElementById(id).value="";});
  document.getElementById("fRank").value="NEW FACE";
  document.getElementById("fCup").value="D";
  document.getElementById("fActive").value=1;
  document.getElementById("prevPhoto").style.backgroundImage="";
  document.getElementById("prevName").textContent="新規キャスト";
  document.getElementById("prevSub").textContent="NEW FACE";
  document.getElementById("delBtn").style.display="none";
  document.getElementById("modalBg").classList.add("on");
}
function closeModal(){document.getElementById("modalBg").classList.remove("on");editIdx=null;}
function onImgChange(){var u=document.getElementById("fImg").value;document.getElementById("prevPhoto").style.backgroundImage=u?"url('"+u+"')":''}
function onNameChange(){document.getElementById("prevName").textContent=document.getElementById("fName").value||"-";}
function onRankChange(){document.getElementById("prevSub").textContent=document.getElementById("fRank").value;}
function doSave(){
  var name=document.getElementById("fName").value.trim();
  if(!name){showToast("名前を入力してください");return;}
  var data={
    rank:document.getElementById("fRank").value,
    name:name,
    age:document.getElementById("fAge").value,
    height:document.getElementById("fHeight").value,
    cup:document.getElementById("fCup").value,
    img:document.getElementById("fImg").value,
    desc:document.getElementById("fDesc").value,
    active:parseInt(document.getElementById("fActive").value)
  };
  if(editIdx!==null){
    data.id=CAST[editIdx].id;
    CAST[editIdx]=data;
    showToast(name+" を更新しました","ok");
  }else{
    data.id=Date.now();
    CAST.push(data);
    showToast(name+" を追加しました","ok");
  }
  saveC();
  renderCast();
  closeModal();
}
function doDelete(){
  if(editIdx===null) return;
  var name=CAST[editIdx].name;
  if(!confirm(name+" を削除しますか？")) return;
  CAST.splice(editIdx,1);
  saveC();
  renderCast();
  closeModal();
  showToast(name+" を削除しました");
}
document.getElementById("modalBg").addEventListener("click",function(e){if(e.target===this)closeModal();});

/* TOAST */
function showToast(msg,type){
  var el=document.getElementById("toastEl");
  el.textContent=msg;
  el.className="toast"+(type?" "+type:"");
  void el.offsetWidth;
  el.classList.add("on");
  clearTimeout(el._t);
  el._t=setTimeout(function(){el.classList.remove("on");},2800);
}

/* INIT */
renderToday();
